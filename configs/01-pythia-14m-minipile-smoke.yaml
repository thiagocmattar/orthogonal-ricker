experiment_name: pythia_14m_minipile_smoke
model:
  provider: huggingface
  name: EleutherAI/pythia-14m-deduped
  revision: main
  initialization: pretrained
data:
  name: JeanKaddour/minipile
  revision: main
  split: train
  text_column: text
  max_documents: 128
evaluation:
  metric: training_loss
run:
  seed: 0
  max_examples: 128
tokenizer:
  name: EleutherAI/pythia-14m-deduped
  revision: main
preprocessing:
  output_dir: data/tokenized
  block_size: 2048
  append_eos: true
  overwrite: false
training:
  max_steps: 50
  warmup_steps: 1
  micro_batch_size: 4
  gradient_accumulation_steps: 1
  learning_rate: 0.00001
  precision: auto
  device: auto
  log_every: 10
validation:
  enabled: true
  split: validation
  max_documents: 32
  eval_every_steps: 25
  eval_batches: 2
  batch_size: 4
checkpoint:
  save_final: true
  save_optimizer: false
output:
  dir: results
