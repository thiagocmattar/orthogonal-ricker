experiment_name: pythia_14m_minipile_full_pass_all_site_pressure_residual_stream_histograms
model:
  provider: huggingface
  name: pythia-14m-random
  architecture: EleutherAI/pythia-14m-deduped
  revision: main
  initialization: random
data:
  name: JeanKaddour/minipile
  revision: main
  split: validation
  text_column: text
  max_documents: 500
evaluation:
  metric: activation_histogram
run:
  seed: 0
  max_examples: 500
tokenizer:
  name: EleutherAI/pythia-14m-deduped
  revision: main
preprocessing:
  output_dir: data/tokenized
  cache_id: 03-pythia-14m-minipile-random-full-10min
  block_size: 2048
  append_eos: true
  overwrite: false
validation:
  enabled: true
  split: validation
  max_documents: 500
  eval_batches: null
  batch_size: 4
activation_histograms:
  sites:
    - residual_streams
  bins: 180
  range_min: -2.0
  range_max: 2.0
  plot_title: Full-pass All-site Pressure Residual Stream Distributions (H_l)
  selected_runs:
    - label: AdamW
      config_id: 50-pythia-14m-minipile-adamw-full-pass
    - label: OR all-site w1 c0.05 s0.05
      config_id: 65-pythia-14m-minipile-orthogonal-ricker-all-site-full-pass-w1-c0p05-s0p05
    - label: OL1 all-site w5
      config_id: 66-pythia-14m-minipile-orthogonal-l1-all-site-full-pass-w5
output:
  dir: results
