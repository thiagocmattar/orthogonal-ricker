experiment_name: pythia_14m_minipile_full_pass_high_pressure_attention_weight_histograms
model:
  provider: huggingface
  name: pythia-14m-random
  architecture: EleutherAI/pythia-14m-deduped
  revision: main
  initialization: random
data:
  name: checkpoint_weights
  split: final_checkpoint
evaluation:
  metric: weight_histogram
run:
  seed: 0
  max_examples: 5
weight_histograms:
  scope: attention_weights
  bins: 180
  range_min: -0.75
  range_max: 0.75
  plot_title: Full-pass High-pressure Attention Weight Distributions
  selected_runs:
    - label: AdamW
      config_id: 50-pythia-14m-minipile-adamw-full-pass
    - label: RN w1 c0.05 s0.05
      config_id: 57-pythia-14m-minipile-ricker-naive-full-pass-w1-c0p05-s0p05
    - label: OR w1 c0.05 s0.05
      config_id: 56-pythia-14m-minipile-orthogonal-ricker-full-pass-w1-c0p05-s0p05
    - label: L1N w5
      config_id: 58-pythia-14m-minipile-l1-naive-full-pass-w5
    - label: OL1 w5
      config_id: 59-pythia-14m-minipile-orthogonal-l1-full-pass-w5
output:
  dir: results
