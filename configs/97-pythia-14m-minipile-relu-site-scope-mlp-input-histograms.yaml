experiment_name: pythia_14m_minipile_relu_site_scope_mlp_input_histograms
model:
  provider: huggingface
  name: pythia-14m-random-relu
  architecture: EleutherAI/pythia-14m-deduped
  revision: main
  initialization: random
  hidden_act: relu
data:
  name: JeanKaddour/minipile
  revision: main
  split: validation
  text_column: text
  max_documents: 500
evaluation:
  metric: activation_histogram
run:
  seed: 0
  max_examples: 500
tokenizer:
  name: EleutherAI/pythia-14m-deduped
  revision: main
preprocessing:
  output_dir: data/tokenized
  cache_id: 03-pythia-14m-minipile-random-full-10min
  block_size: 2048
  append_eos: true
  overwrite: false
validation:
  enabled: true
  split: validation
  max_documents: 500
  eval_batches: null
  batch_size: 4
