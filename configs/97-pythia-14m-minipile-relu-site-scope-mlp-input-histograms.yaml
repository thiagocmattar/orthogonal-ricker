    - label: MLP+res OR
      config_id: 87-pythia-14m-minipile-relu-orthogonal-ricker-mlp-residual-full-pass-w1-c0p05-s0p05
    - label: MLP+res L1N
      config_id: 88-pythia-14m-minipile-relu-l1-naive-mlp-residual-full-pass-w5
