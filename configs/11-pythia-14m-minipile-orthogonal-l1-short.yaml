experiment_name: pythia_14m_minipile_orthogonal_l1_short
model:
  provider: huggingface
  name: pythia-14m-random
  architecture: EleutherAI/pythia-14m-deduped
  revision: main
  initialization: random
data:
  name: JeanKaddour/minipile
  revision: main
  split: train
  text_column: text
  max_documents: null
evaluation:
  metric: training_loss
run:
  seed: 0
  max_examples: 1000000
tokenizer:
  name: EleutherAI/pythia-14m-deduped
  revision: main
preprocessing:
  output_dir: data/tokenized
  cache_id: 03-pythia-14m-minipile-random-full-10min
  block_size: 2048
  append_eos: true
  overwrite: false
training:
  max_steps: 100000
  max_wall_seconds: 180
  warmup_steps: 100
  micro_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 0.00003
  optimizer: adamw
  adamw_betas:
    - 0.9
    - 0.999
  adamw_eps: 1.0e-08
  weight_decay: 0.01
  precision: auto
  device: auto
  log_every: 25
activation_pressure:
  enabled: true
  method: orthogonal_l1
  sites: [mlp_hiddens]
  weight: 0.05
  step_budget: 0.5
  eps: 1.0e-12
  log_thresholds: [0.0, 0.001, 0.01]
validation:
  enabled: true
  split: validation
  max_documents: 500
  eval_every_steps: 100
  eval_batches: null
  batch_size: 4
checkpoint:
  save_final: true
  save_optimizer: false
output:
  dir: results
