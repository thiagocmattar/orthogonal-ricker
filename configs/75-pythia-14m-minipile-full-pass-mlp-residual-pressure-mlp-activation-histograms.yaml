experiment_name: pythia_14m_minipile_full_pass_mlp_residual_pressure_mlp_activation_histograms
model:
  provider: huggingface
  name: pythia-14m-random
  architecture: EleutherAI/pythia-14m-deduped
  revision: main
  initialization: random
data:
  name: JeanKaddour/minipile
  revision: main
  split: validation
  text_column: text
  max_documents: 500
evaluation:
  metric: activation_histogram
run:
  seed: 0
  max_examples: 500
tokenizer:
  name: EleutherAI/pythia-14m-deduped
  revision: main
preprocessing:
  output_dir: data/tokenized
  cache_id: 03-pythia-14m-minipile-random-full-10min
  block_size: 2048
  append_eos: true
  overwrite: false
validation:
  enabled: true
  split: validation
  max_documents: 500
  eval_batches: null
  batch_size: 4
activation_histograms:
  sites:
    - mlp_hiddens
  bins: 180
  range_min: -0.25
  range_max: 4.0
  plot_title: Full-pass MLP+Residual Pressure MLP Activation Distributions
  selected_runs:
    - label: RN MLP+res w1 c0.05 s0.05
      config_id: 70-pythia-14m-minipile-ricker-naive-mlp-residual-full-pass-w1-c0p05-s0p05
    - label: OR MLP+res w1 c0.05 s0.05
      config_id: 71-pythia-14m-minipile-orthogonal-ricker-mlp-residual-full-pass-w1-c0p05-s0p05
    - label: L1N MLP+res w5
      config_id: 72-pythia-14m-minipile-l1-naive-mlp-residual-full-pass-w5
    - label: OL1 MLP+res w5
      config_id: 73-pythia-14m-minipile-orthogonal-l1-mlp-residual-full-pass-w5
output:
  dir: results
